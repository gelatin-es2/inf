<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VSL Smart Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #000; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: sans-serif; overflow: hidden; }
        .video-wrapper { position: relative; width: 100%; height: 100%; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Barra de Progresso Inteligente */
        .progress-container { position: absolute; top: 0; left: 0; width: 100%; height: 5px; background: rgba(255,255,255,0.2); z-index: 20; }
        .progress-bar { width: 0%; height: 100%; background: #ff0000; box-shadow: 0 0 10px #ff0000; transition: width 0.2s linear; }

        /* Overlay Estilo Vturb */
        .sound-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; z-index: 10; cursor: pointer; }
        .sound-box { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; background: #1f6cff; border-radius: 14px; padding: 18px 22px; color: #fff; box-shadow: 0 6px 22px rgba(0,0,0,0.4); animation: pulseBox 1.6s infinite; min-width: 170px; max-width: 80%; }
        .sound-text { font-size: 15px; font-weight: 600; text-align: center; line-height: 1.15; }
        .sound-icon-svg { width: 48px; height: 48px; margin: 4px 0; }

        @keyframes pulseBox { 0% { transform: scale(1); } 50% { transform: scale(1.04); } 100% { transform: scale(1); } }
        @media (min-width: 480px) {
            .sound-box { padding: 22px 28px; min-width: 200px; gap: 8px; }
            .sound-text { font-size: 17px; }
            .sound-icon-svg { width: 56px; height: 56px; }
        }
    </style>
</head>
<body>

<div class="video-wrapper">
    <div class="progress-container"><div id="bar" class="progress-bar"></div></div>
    <video id="video" playsinline muted autoplay></video>

    <div id="overlay" class="sound-overlay">
        <div class="sound-box">
            <div class="sound-text">Haz clic en el video</div>
            <svg class="sound-icon-svg" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
                <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
            </svg>
            <div class="sound-text">activar el sonido</div>
        </div>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const src = params.get('src');
    const video = document.getElementById('video');
    const overlay = document.getElementById('overlay');
    const bar = document.getElementById('bar');

    if (src) {
        const isHls = /\.m3u8(\?|$)/i.test(src);

        if (isHls) {
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(src);
                hls.attachMedia(video);
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = src;
            }
        } else {
            video.src = src;
        }
        video.play();
    }

    video.addEventListener('timeupdate', () => {
        if (!video.duration) return;

        let realPct = (video.currentTime / video.duration) * 100;
        let fakePct;

        if (realPct < 10) {
            fakePct = realPct * 4;
        } else {
            fakePct = 40 + (realPct - 10) * (60 / 90);
        }

        bar.style.width = Math.min(fakePct, 99.8) + '%';
    });

    overlay.onclick = () => {
        overlay.style.display = 'none';
        video.muted = false;
        video.currentTime = 0;
        video.play();
    };
</script>
</body>
</html>
